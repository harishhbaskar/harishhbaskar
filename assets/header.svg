<svg
  width="1200"
  height="180"
  viewBox="0 0 1200 180"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#87CEEB" />
      <stop offset="50%" stop-color="#4FC3F7" />
      <stop offset="100%" stop-color="#0288D1" />
    </linearGradient>
  </defs>

  <!-- Ocean header -->

  <path
    fill="url(#ocean)"
    d="M0 0H1200V145
       C1000 190 800 115 600 150
       C400 185 200 120 0 155Z"
  />

  <!-- Name -->

  <text
    x="600"
    y="65"
    text-anchor="middle"
    fill="white"
    font-family="Trebuchet MS, Arial, sans-serif"
    font-size="42"
    font-weight="600"
  >
    Harish Baskar
  </text>

  <!-- Role -->

  <text
    x="600"
    y="95"
    text-anchor="middle"
    fill="white"
    font-family="Trebuchet MS, Arial, sans-serif"
    font-size="18"
  >
    Full Stack Developer
  </text>

  <!-- Swimming fish -->

  <g font-size="19">

    <g transform="scale(-1,1)">
      <text y="122">
        🐟
        <animate
          attributeName="x"
          from="60"
          to="-1260"
          dur="18s"
          repeatCount="indefinite"
        />
      </text>
    </g>

    <g transform="scale(-1,1)">
      <text y="145">
        🐠
        <animate
          attributeName="x"
          from="100"
          to="-1260"
          dur="25s"
          begin="5s"
          repeatCount="indefinite"
        />
      </text>
    </g>

    <g transform="scale(-1,1)">
      <text y="110">
        🐟
        <animate
          attributeName="x"
          from="80"
          to="-1260"
          dur="21s"
          begin="9s"
          repeatCount="indefinite"
        />
      </text>
    </g>

  </g>

  <!-- Small bubbles -->

  <g fill="white" opacity="0.4">

    <circle cy="132" r="2">
      <animate
        attributeName="cx"
        from="100"
        to="1100"
        dur="20s"
        repeatCount="indefinite"
      />
    </circle>

    <circle cy="115" r="3">
      <animate
        attributeName="cx"
        from="350"
        to="1150"
        dur="26s"
        repeatCount="indefinite"
      />
    </circle>

    <circle cy="140" r="1.5">
      <animate
        attributeName="cx"
        from="50"
        to="1050"
        dur="17s"
        begin="6s"
        repeatCount="indefinite"
      />
    </circle>

  </g>

</svg>